[build]
  publish = "static"

# Proxy /api/* calls to the Render.com Python backend.
# Update the `to` URL below after you create your Render service.
[[redirects]]
  from = "/api/*"
  to = "https://REPLACE_WITH_RENDER_URL.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
